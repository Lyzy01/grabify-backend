services:
  - type: web
    name: grabify-api
    env: node
    plan: free
    buildCommand: |
      npm install
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
      chmod a+rx /usr/local/bin/yt-dlp
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
